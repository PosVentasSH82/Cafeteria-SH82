<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cafetería SH82</title>

<!-- FAVICON -->
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="manifest" href="site.webmanifest">

<link rel="stylesheet" href="style.css" />
</head>

<body>

<main id="loginScreen" class="home">
<section class="card">
<h2>Ingreso de usuario</h2>
<div class="grid2">
<label>Usuario<input type="text" id="loginUserInput" placeholder="Usuario" /></label>
<label>Contraseña<input type="password" id="loginPassInput" placeholder="Contraseña" /></label>
</div>
<button id="loginBtn" class="primary" type="button">Ingresar</button>
<p id="loginMessage"></p>
</section>
</main>

<main id="homeScreen" class="home hidden">
<section class="card brand">
<img id="homeLogo" class="home-logo hidden" alt="Logo negocio" />
<div id="logoPlaceholder" class="logo-placeholder">Tu logo</div>
<h1 id="businessName">Mi Cafetería</h1>
<p id="homeSubtitle">Pantalla principal</p>
</section>

<section class="card">
<strong id="sessionInfo">Sin sesión</strong>
<button id="logoutBtn" class="secondary" type="button">Cerrar sesión</button>
</section>

<p id="homeMessage"></p>

<section class="home-actions">
<button id="goSalesBtn" class="primary hidden" type="button">Ventas</button>
<button id="startCashBtn" class="secondary" type="button">Abrir caja</button>
<button id="closeCashBtn" class="secondary hidden" type="button">Cerrar caja</button>
<button id="goCashClosingsBtn" class="secondary" type="button">Cierres de caja</button>
<button id="goWarehouseBtn" class="secondary" type="button">Almacén</button>
<button id="openSettingsBtn" class="secondary" type="button">Configuración</button>
</section>

</main>

<main id="posScreen" class="hidden">

<header class="app-toolbar">
<div class="pos-title-wrap">
<img id="posHeaderLogo" class="pos-header-logo hidden" alt="Logo ventas" />
<div>
<h1 id="posTitle">POS Cafetería</h1>
<p id="posSubtitle">Ventas, productos, deudas, cierres y resumen diario.</p>
</div>
</div>

<div class="grid2">
<strong id="posSessionInfo">Usuario: -</strong>
<div>
<button id="backHomeBtn" class="secondary" type="button">Volver a inicio</button>
<button id="posLogoutBtn" class="secondary" type="button">Cerrar sesión</button>
</div>
</div>
</header>

<section id="ventas" class="panel active">
<h2>Nueva venta</h2>
<button id="openNewSaleBtn" class="primary" type="button">Realizar nueva venta</button>
</section>

</main>

<script defer src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="script.js"></script>

</body>
</html>
